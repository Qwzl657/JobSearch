databaseChangeLog:
  - changeSet:
      id: create-resumes
      author: ali
      changes:
        - createTable:
            tableName: resumes
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: user_id, type: BIGINT }
              - column: { name: name, type: VARCHAR(100) }
              - column: { name: category, type: VARCHAR(50) }