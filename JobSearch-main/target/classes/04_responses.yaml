databaseChangeLog:
  - changeSet:
      id: create-responses
      author: ali
      changes:
        - createTable:
            tableName: responses
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: user_id, type: BIGINT }
              - column: { name: vacancy_id, type: BIGINT }