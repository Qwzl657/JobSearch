databaseChangeLog:
  - changeSet:
      id: create-education
      author: ali
      changes:
        - createTable:
            tableName: education
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: resume_id, type: BIGINT }
              - column: { name: institution, type: VARCHAR(255) }